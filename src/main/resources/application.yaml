spring:
  main:
    web-application-type: servlet
  application:
    name: curious-images
  datasource:
    url: jdbc:h2:file:~/cimages/${DATABASE_FILE};DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  sql.init.mode: always
  jpa.defer-datasource-initialization: false
  title: cImages
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED}
  cache:
    caffeine:
      spec: "maximumSize=5,expireAfterAccess=600s"

app:
  thumbnail-cache:
    dir: ~/cimages/thumb-cache
  duplicate-detection:
    thread-count: 4

logging.level:
  org.jooq.Constants: off
  com:
    github:
      curiousoddman:
        curious_images:
          ui:
            controller:
              element: debug
          model:
            playlist: debug
